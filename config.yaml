# 精细：整 period 先时间均分 6 段 → 每段再 chunk 化（chunk_* 不改变 6 分边界，只约束每段输入长度）
init_data_root: data/init_data
label_xlsx: null

model_type: cnn_transformer
chunk_length: 1024
max_chunks: 16
hidden_dim: 256
transformer_nhead: 4
transformer_layers: 1
transformer_ff_mult: 2
transformer_dropout: 0.1

batch_size: 512
epochs: 64
lr: 0.003
weight_decay: 0.0001

# 仅 1_train_prediction（ResNet 窗口回归）读取；不覆盖上面的 weight_decay，避免影响 train.py
prediction_weight_decay: 0.0005
resnet_dropout: 0.15
resnet_head_dropout: 0.15
max_grad_norm: 1.0
aug_noise_std: 0.012
aug_scale: 0.12
aug_channel_dropout: 0.07

train_ratio: 1.0
test_ratio: 0.05
seed: 42

num_workers: 0
device: cuda

tensorboard_logdir: runs/mas
checkpoint_dir: checkpoints
